name: CI/CD Deploy

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"

jobs:
  frontend:
    if: contains(github.event.head_commit.message, '[skip frontend]') == false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Deploy to S3
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SOURCE_DIR: frontend/build

  backend-layer:
    if: contains(join(github.event.commits.*.modified), 'backend/layer/common/python')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - run: pip install -r requirements.txt
      - run: pytest layer
      - name: Zip layer
        run: |
          cd layer/common
          rm -rf python/__pycache__ python/test*.py
          zip -r ../../layer.zip python -x "**/__pycache__/*" -x "**/test*.py"
      - name: Publish Lambda Layer
        id: publish_layer
        run: |
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name InventoryManagementCommonLayer \
            --zip-file fileb://layer.zip \
            --compatible-runtimes python3.13 \
            --region ${{ secrets.AWS_REGION }} \
            --query LayerVersionArn --output text)
          echo "layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    outputs:
      layer_arn: ${{ steps.publish_layer.outputs.layer_arn }}

  backend-functions:
    needs: [backend-layer]
    if: always() # backend-layer が skipped でも実行されるようにする
    runs-on: ubuntu-latest
    strategy:
      matrix:
        function:
          - components-crud
          - organization-id-get
          - user-register
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check if function changed
        id: check_changed
        run: |
          # 直前のコミット SHA を取得
          BEFORE=$(git rev-parse HEAD^ 2>/dev/null || echo "")

          if [ -n "$BEFORE" ]; then
            # 直前コミットと比較して変更を確認
            DIFF=$(git diff --name-only $BEFORE HEAD)
          else
            # 初回コミットの場合は全ファイルを対象
            DIFF=$(git ls-files)
          fi

          # 関数ディレクトリかレイヤーの変更があれば続行
          if echo "$DIFF" | grep -q "^backend/${{ matrix.function }}/"; then
            echo "Changes detected, continuing job."
          elif echo "$DIFF" | grep -q "^backend/layer/common/python"; then
            echo "Layer changes detected, continuing job."
          else
            echo "No changes detected for ${{ matrix.function }}. Skipping job."
            exit 78  # neutral status
          fi
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - run: pip install -r requirements.txt
      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/layer/common/python
          pytest ${{ matrix.function }}
      - name: Zip lambda function
        run: |
          cd ${{ matrix.function }}
          rm -rf __pycache__ test*.py
          zip -r ../${{ matrix.function }}.zip .
          cd ..
      - name: Update Lambda function
        run: |
          FUNC_NAME=${{ matrix.function }}
          LAYER_ARN=${{ needs.backend-layer.outputs.layer_arn }}

          if [[ -n "$LAYER_ARN" ]]; then
            aws lambda update-function-configuration \
              --function-name $FUNC_NAME \
              --layers $LAYER_ARN \
              --region ${{ secrets.AWS_REGION }}
          fi

          FUNCTION_UPDATED=false
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
           | grep -q "^backend/${FUNC_NAME}/"; then
            FUNCTION_UPDATED=true
          fi

          if [[ "$FUNCTION_UPDATED" == "true" ]]; then
            aws lambda update-function-code \
              --function-name $FUNC_NAME \
              --zip-file fileb://./${FUNC_NAME}.zip \
              --region ${{ secrets.AWS_REGION }}
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
